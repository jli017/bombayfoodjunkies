<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bombay Food Junkies | SEED Program</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
html { scroll-behavior: smooth; }

:root {
    --green-deep: #1a4d1e;
    --green-mid: #2e7d32;
    --green-bright: #4caf50;
    --green-light: #e8f5e9;
    --green-pale: #f1f8f2;
    --gold: #c9a84c;
    --gold-light: #f5e9c8;
    --text-dark: #1a1a1a;
    --text-mid: #444;
    --text-muted: #777;
    --white: #ffffff;
    --border: #d8e8da;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'DM Sans', sans-serif;
    color: var(--text-dark);
    background: linear-gradient(to bottom, #f9faf9, #f1f8f2);
    line-height: 1.7;
}

#progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 4px;
    width: 0%;
    background: linear-gradient(90deg, var(--green-bright), var(--gold));
    z-index: 9999;
}

.hero {
    background: linear-gradient(160deg, #0d2b10 0%, #1a4d1e 50%, #2e7d32 100%);
    color: white;
    text-align: center;
    padding: 110px 20px 90px;
    position: relative;
    overflow: hidden;
}
.hero::before {
    content: '';
    position: absolute; inset: 0;
    background: url('https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?auto=format&fit=crop&w=1920&q=60') center/cover;
    opacity: 0.08;
}
.hero-inner { position: relative; }
.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 6vw, 5rem);
    font-weight: 900;
    letter-spacing: 1px;
    line-height: 1.1;
}
.hero .sub {
    font-size: 1rem;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #a5d6a7;
    margin-bottom: 16px;
    font-weight: 500;
}
.hero p {
    font-size: 1.15rem;
    max-width: 680px;
    margin: 22px auto 0;
    color: #c8e6c9;
    font-weight: 300;
}
.gold-bar { width: 60px; height: 3px; background: var(--gold); margin: 20px auto 0; border-radius: 2px; }

.section { padding: 80px 20px; }
.section.alt { background: var(--green-pale); }
.section.dark { background: var(--green-deep); color: white; }
.wrap { max-width: 1140px; margin: 0 auto; }

.section-label {
    font-size: 0.78rem;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--green-bright);
    font-weight: 600;
    margin-bottom: 10px;
}
.section-label.light { color: #a5d6a7; }
.section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.9rem, 4vw, 2.8rem);
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--green-deep);
}
.section-title.light { color: white; }
.section-desc {
    color: var(--text-muted);
    max-width: 650px;
    font-size: 1.05rem;
}
.section-head { margin-bottom: 50px; }

.section-divider {
    height: 80px;
    background: linear-gradient(to bottom, transparent, rgba(76,175,80,0.15), transparent);
}

.seed-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 24px;
}
.seed-card {
    background: white;
    border-radius: 12px;
    padding: 32px 26px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border-top: 4px solid var(--green-bright);
    transition: transform .2s, box-shadow .2s;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(0,0,0,0.04);
}
.seed-card:hover { transform: translateY(-6px) scale(1.01); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
.seed-letter {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    font-weight: 900;
    color: var(--green-mid);
    line-height: 1;
    margin-bottom: 10px;
}

.btn-primary {
    background: var(--green-deep);
    color: white;
    border: none;
    padding: 14px 36px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}
.btn-primary::after {
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.2),transparent);
    opacity:0;
    transition:opacity .3s;
}
.btn-primary:hover::after { opacity:1; }

.animate { opacity: 0; transform: translateY(32px); transition: all 0.6s ease; }
.animate.visible { opacity: 1; transform: none; }

.stagger-children > * { opacity:0; transform:translateY(28px); transition:all .5s ease; }
.stagger-children.visible > * { opacity:1; transform:none; }

.modal-overlay {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    z-index:1000;
    align-items:center;
    justify-content:center;
}
.modal-overlay.active { display:flex; }

.modal {
    background:white;
    border-radius:14px;
    padding:40px;
    max-width:500px;
    width:100%;
    transform:scale(0.95);
    opacity:0;
    transition:all .2s ease;
}
.modal-overlay.active .modal {
    transform:scale(1);
    opacity:1;
}

.timeline-phase a { display:block; text-decoration:none; cursor:pointer; }
.timeline-phase:hover .phase-header { transform:scale(1.03); transition:.2s; }

</style>
</head>
<body>

<div id="progress-bar"></div>

<header class="hero">
<div class="hero-inner">
<div class="sub">Bombay Food Junkies</div>
<h1>SEED Program</h1>
<div class="gold-bar"></div>
<p>Turning small restaurants into sustainability leaders—without increasing costs.</p>
</div>
</header>

<section class="section">
<div class="wrap">
<div class="section-head animate">
<div class="section-label">Our Foundation</div>
<h2 class="section-title">The SEED Framework</h2>
<p class="section-desc">A structured, ethical, and scalable sustainability model.</p>
</div>
</div>
</section>

<script>
const progressBar = document.getElementById('progress-bar');

window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const height = document.documentElement.scrollHeight - window.innerHeight;
    const progress = (scrollTop / height) * 100;
    progressBar.style.width = progress + '%';
});

window.addEventListener('load', () => {
    document.querySelector('.hero').classList.add('hero-loaded');
});

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
        }
    });
}, { threshold: 0.12 });

document.querySelectorAll('.animate').forEach(el => observer.observe(el));
document.querySelectorAll('.stagger-children').forEach(el => observer.observe(el));

function resetAnimations() {
    document.querySelectorAll('.animate, .stagger-children').forEach(el => {
        el.classList.remove('visible');
    });
}

function reobserveAnimations() {
    document.querySelectorAll('.animate').forEach(el => observer.observe(el));
    document.querySelectorAll('.stagger-children').forEach(el => observer.observe(el));
}

document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function (e) {
        const targetId = this.getAttribute('href');
        if (!targetId || targetId === '#') return;
        const target = document.querySelector(targetId);
        if (!target) return;
        e.preventDefault();
        resetAnimations();
        target.scrollIntoView({ behavior: 'smooth' });
        setTimeout(() => {
            reobserveAnimations();
        }, 600);
    });
});
</script>

</body>
</html>
